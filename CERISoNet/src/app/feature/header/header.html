<div class="flex items-center justify-between bg-amber-700 p-4 rounded-b-xl text-white shadow-md">

  <h1 class="text-xl font-bold">
    CERI<span class="opacity-70">SoNet</span>
  </h1>

  <div class="flex flex-col items-end gap-1">

    @if(authService.isLoggedIn()){
      <div class="flex items-center gap-3">
        <span class="font-medium text-sm md:text-base">
          Bonjour {{ authService.currentUser() }}
        </span>

        <button (click)="authService.deconnexion()"
                class="bg-white text-amber-700 px-3 py-1 rounded-lg text-xs font-bold hover:bg-amber-50">
          Quitter
        </button>
      </div>

      @if(authService.getDerniereConnexion()) {
        <span class="text-[10px] md:text-xs opacity-80 italic">
          Dernière connexion : {{ authService.getDerniereConnexion() }}
        </span>
      }

    } @else {
      <button
        (click)="authService.openLoginDialog()"
        class="bg-white text-amber-700 px-4 py-1.5 rounded-lg text-sm font-bold hover:bg-amber-50">
        Se connecter
      </button>
    }
  </div>
</div>
